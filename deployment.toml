[[webhook_endpoint_js.routes]]
methods = ["POST"]
route = "/api/say/:execution-id"

[[webhook_endpoint_js.routes]]
methods = ["POST"]
route = "/api/cleanup/:execution-id"

[[webhook_endpoint_js.routes]]
methods = ["POST"]
route = "/api/fork/:execution-id"

[[webhook_endpoint_js.env_vars]]
key = "OBELISK_API_URL"
value = "${OBELISK_API_URL:-http://127.0.0.1:5005}"

[[webhook_endpoint_js.env_vars]]
key = "OBELISK_UI_URL"
value = "${OBELISK_UI_URL:-http://localhost:8080}"

[[webhook_endpoint_js.allowed_host]]
pattern = "${OBELISK_API_URL:-http://127.0.0.1:5005}"
methods = [
    "GET",
    "PUT",
]
